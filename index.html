<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Downloader & Sharer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 90%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 2em;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        input[type="url"], input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input[type="url"]:focus, input[type="text"]:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            display: none;
        }
        .result.show { display: block; }
        .result a {
            color: #667eea;
            word-break: break-all;
        }
        .progress {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin-top: 20px;
            overflow: hidden;
            display: none;
        }
        .progress.show { display: block; }
        .progress-bar {
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            transition: width 0.3s;
            width: 0%;
        }
        .status {
            text-align: center;
            margin-top: 10px;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📥 File Downloader & Sharer</h1>
        
        <div class="input-group">
            <label for="fileUrl">File URL</label>
            <input type="url" id="fileUrl" placeholder="https://example.com/file.zip" required>
        </div>
        
        <div class="input-group">
            <label for="fileName">Save As (optional)</label>
            <input type="text" id="fileName" placeholder="custom-filename.ext">
        </div>
        
        <button id="downloadBtn" onclick="triggerDownload()">
            ⬇️ Download & Share
        </button>
        
        <div class="progress" id="progress">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        
        <div class="status" id="status"></div>
        
        <div class="result" id="result">
            <h3>✅ File Ready!</h3>
            <p><strong>Download Link:</strong></p>
            <a href="#" id="downloadLink" target="_blank"></a>
            <button onclick="copyToClipboard()" style="margin-top: 10px; font-size: 14px;">
                📋 Copy Link
            </button>
        </div>
    </div>

    <script>
        async function triggerDownload() {
            const url = document.getElementById('fileUrl').value;
            const fileName = document.getElementById('fileName').value;
            
            if (!url) {
                alert('Please enter a URL');
                return;
            }
            
            const btn = document.getElementById('downloadBtn');
            const progress = document.getElementById('progress');
            const progressBar = document.getElementById('progressBar');
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            
            btn.disabled = true;
            btn.textContent = '⏳ Processing...';
            progress.classList.add('show');
            result.classList.remove('show');
            
            // Trigger GitHub Action via repository_dispatch
            try {
                status.textContent = 'Sending download request...';
                progressBar.style.width = '30%';
                
                // This requires a GitHub token with repo scope
                const response = await fetch(
                    `https://api.github.com/repos/YOUR_USERNAME/YOUR_REPO/dispatches`,
                    {
                        method: 'POST',
                        headers: {
                            'Authorization': 'token YOUR_GITHUB_TOKEN',
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            event_type: 'download-file',
                            client_payload: {
                                url: url,
                                filename: fileName || url.split('/').pop()
                            }
                        })
                    }
                );
                
                status.textContent = 'File downloading...';
                progressBar.style.width = '60%';
                
                // Wait for action to complete (poll the API)
                await waitForCompletion();
                
                status.textContent = 'File saved successfully!';
                progressBar.style.width = '100%';
                
                const finalName = fileName || url.split('/').pop();
                const downloadUrl = `https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/downloads/${finalName}`;
                
                document.getElementById('downloadLink').href = downloadUrl;
                document.getElementById('downloadLink').textContent = downloadUrl;
                result.classList.add('show');
                
            } catch (error) {
                status.textContent = '❌ Error: ' + error.message;
            } finally {
                btn.disabled = false;
                btn.textContent = '⬇️ Download & Share';
                setTimeout(() => progress.classList.remove('show'), 2000);
            }
        }
        
        async function waitForCompletion() {
            // Poll for workflow completion
            for (let i = 0; i < 30; i++) {
                await new Promise(resolve => setTimeout(resolve, 5000));
                // Check if file exists in repo
                const checkResponse = await fetch(
                    `https://api.github.com/repos/YOUR_USERNAME/YOUR_REPO/actions/runs?status=completed`,
                    {
                        headers: {
                            'Authorization': 'token YOUR_GITHUB_TOKEN'
                        }
                    }
                );
                const data = await checkResponse.json();
                if (data.workflow_runs?.[0]?.conclusion === 'success') {
                    return;
                }
            }
        }
        
        function copyToClipboard() {
            const link = document.getElementById('downloadLink').textContent;
            navigator.clipboard.writeText(link).then(() => {
                alert('Link copied to clipboard!');
            });
        }
    </script>
</body>
</html>
